<body class="section-dark" style="background:var(--bg-dark)">

  <header class="site-header">
    <img src="https://growthmarketingco.com/images/logo.png" alt="Growth Marketing Media" />
  </header>

  <section class="page-intro">
    <div class="container">
      <h1>Choose a Time for Your Free Strategy Call</h1>
      <p>15 minutes. We&rsquo;ll show you exactly how this works for your market.</p>
    </div>
  </section>

  <div class="calendar-wrap">
    <!-- GHL booking embed -->
    <iframe src="https://api.leadconnectorhq.com/widget/booking/9WIdxZKft7481V1mX5uz"
            style="width:100%;border:none;overflow:hidden;"
            scrolling="no"
            id="9WIdxZKft7481V1mX5uz_1782743879826"></iframe>

  <footer class="site-footer">

  </footer>

  <script>
    // Redirect to the confirmation page when GHL signals a completed booking.
    window.addEventListener('message', function (e) {
      var d = e.data;
      var isBooked =
        (typeof d === 'string' && /appointment|booked|booking_confirm/i.test(d)) ||
        (d && (d.type === 'appointmentBooked' || d.event === 'appointmentBooked' || d.page === 'thankyou'));
      if (isBooked) {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ event: 'calendar_booked' });
        window.location.href = 'confirmation.html';
      }
    });
  </script>
